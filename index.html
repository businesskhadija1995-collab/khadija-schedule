<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule & Habits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Schedule & Habits</h1>
            <p id="currentDate"></p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="daily">Daily</button>
            <button class="tab-btn" data-tab="weekly">Weekly</button>
            <button class="tab-btn" data-tab="monthly">Monthly</button>
        </div>

        <div class="tab-content">
            <div id="daily" class="tab-pane active">
                <div class="add-task-section">
                    <input type="text" id="dailyTaskInput" placeholder="Add a daily habit...">
                    <button onclick="addTask('daily')">Add</button>
                </div>
                <ul id="dailyTasks" class="task-list"></ul>
            </div>

            <div id="weekly" class="tab-pane">
                <div class="add-task-section">
                    <input type="text" id="weeklyTaskInput" placeholder="Add a weekly habit...">
                    <button onclick="addTask('weekly')">Add</button>
                </div>
                <ul id="weeklyTasks" class="task-list"></ul>
            </div>

            <div id="monthly" class="tab-pane">
                <div class="add-task-section">
                    <input type="text" id="monthlyTaskInput" placeholder="Add a monthly habit...">
                    <button onclick="addTask('monthly')">Add</button>
                </div>
                <ul id="monthlyTasks" class="task-list"></ul>
            </div>
        </div>

        <div class="manage-section">
            <button onclick="openManageModal()">Manage Habits</button>
        </div>

        <div class="email-section">
            <h2>Email Notifications</h2>
            <div class="email-controls">
                <button onclick="sendDailyReport()">Send Daily Report</button>
                <button onclick="sendWeeklyReport()">Send Weekly Report</button>
                <button onclick="sendMonthlyReport()">Send Monthly Report</button>
            </div>
            <div id="emailStatus" class="email-status"></div>
        </div>

        <div class="reminder-section">
            <h2>Automatic Reminders</h2>
            <div class="reminder-controls">
                <div class="reminder-setting">
                    <label>Daily Reminder Time:</label>
                    <input type="time" id="dailyReminderTime" value="09:00">
                    <label class="reminder-toggle">
                        <input type="checkbox" id="dailyReminderEnabled" onchange="saveReminderSettings()">
                        <span>Enable</span>
                    </label>
                </div>
                <div class="reminder-setting">
                    <label>Weekly Reminder Day:</label>
                    <select id="weeklyReminderDay" onchange="saveReminderSettings()">
                        <option value="1">Monday</option>
                        <option value="2">Tuesday</option>
                        <option value="3">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="5">Friday</option>
                        <option value="6">Saturday</option>
                        <option value="0">Sunday</option>
                    </select>
                    <input type="time" id="weeklyReminderTime" value="09:00">
                    <label class="reminder-toggle">
                        <input type="checkbox" id="weeklyReminderEnabled" onchange="saveReminderSettings()">
                        <span>Enable</span>
                    </label>
                </div>
                <div class="reminder-setting">
                    <label>Monthly Reminder Day:</label>
                    <select id="monthlyReminderDay" onchange="saveReminderSettings()">
                        <option value="1">1st</option>
                        <option value="15">15th</option>
                        <option value="30">30th</option>
                    </select>
                    <input type="time" id="monthlyReminderTime" value="09:00">
                    <label class="reminder-toggle">
                        <input type="checkbox" id="monthlyReminderEnabled" onchange="saveReminderSettings()">
                        <span>Enable</span>
                    </label>
                </div>
            </div>
            <div id="reminderStatus" class="reminder-status"></div>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeManageModal()">&times;</span>
            <h2>Manage Your Habits</h2>
            <div class="manage-tabs">
                <button class="manage-tab-btn active" data-manage-tab="manage-daily">Daily</button>
                <button class="manage-tab-btn" data-manage-tab="manage-weekly">Weekly</button>
                <button class="manage-tab-btn" data-manage-tab="manage-monthly">Monthly</button>
            </div>
            <div id="manage-daily" class="manage-tab-pane active">
                <ul id="manageDailyTasks" class="manage-task-list"></ul>
            </div>
            <div id="manage-weekly" class="manage-tab-pane">
                <ul id="manageWeeklyTasks" class="manage-task-list"></ul>
            </div>
            <div id="manage-monthly" class="manage-tab-pane">
                <ul id="manageMonthlyTasks" class="manage-task-list"></ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
